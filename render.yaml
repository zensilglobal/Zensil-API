# Render Blueprint — deploys the dashboard from this repo's Dockerfile.
# In Render: New → Blueprint → select this repo, then fill the sync:false
# env vars when prompted. The ETL stays on GitHub Actions (.github/workflows/etl.yml).
services:
  - type: web
    name: zensil-web
    runtime: docker
    plan: free # spins down after ~15 min idle; switch to "starter" for always-on
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /login # returns 200 without a session (/ redirects to it)
    autoDeploy: true # redeploy on every push to main
    envVars:
      - key: APP_AUTH_EMAIL
        value: office@zensil.in
      - key: APP_AUTH_PASSWORD
        sync: false # entered in the Render dashboard on first deploy
      - key: APP_AUTH_SECRET
        generateValue: true # Render generates a long random secret
      - key: DATABASE_URL
        sync: false # Neon pooled connection string
      - key: ANTHROPIC_API_KEY
        sync: false # optional — leave blank until /api/claude goes live
