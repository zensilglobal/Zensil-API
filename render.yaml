# Render Blueprint — the always-on dashboard also runs the warehouse sync
# in-process (instrumentation.ts spawns the bundled Python etl package on a
# timer: orders every 10 min, inventory+returns every 30 min). External cron
# schedulers proved unreliable: GitHub Actions skipped ~95% of scheduled fires
# and Render cron stalled after one run. GitHub workflows remain as backup.
envVarGroups:
  # SP-API credentials for the in-process ETL — paste values from etl/.env.
  - name: etl-secrets
    envVars:
      - key: DATABASE_URL
        sync: false # Neon pooled connection string
      - key: SPAPI_CLIENT_ID
        sync: false
      - key: SPAPI_CLIENT_SECRET
        sync: false
      - key: SPAPI_REFRESH_TOKEN
        sync: false
      - key: ALERT_WEBHOOK_URL
        sync: false # optional — Slack/Discord webhook for pipeline failures

services:
  - type: web
    name: zensil-web
    runtime: docker
    plan: starter # always-on — required: this service IS the ETL scheduler
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health # 200 only when the app AND warehouse conn are good
    autoDeploy: true # redeploy on every push to main
    envVars:
      - fromGroup: etl-secrets
      # standalone server.js binds to $HOSTNAME; without this the container's
      # own hostname wins and Render's proxy can't reach the app (502)
      - key: HOSTNAME
        value: 0.0.0.0
      - key: PORT
        value: "3000"
      - key: ETL_INLINE
        value: "1" # enable the in-process sync scheduler
      - key: APP_AUTH_EMAIL
        value: office@zensil.in
      - key: APP_AUTH_PASSWORD
        sync: false # entered in the Render dashboard on first deploy
      - key: APP_AUTH_SECRET
        generateValue: true # Render generates a long random secret
      - key: DATABASE_URL
        sync: false # Neon pooled connection string
      - key: GEMINI_API_KEY
        sync: false # optional — leave blank until /api/claude goes live
