name: ETL pipelines

on:
  schedule:
    - cron: "0 */3 * * *" # every 3 hours (orders/inventory cadence, PRD §10.1)
  workflow_dispatch: {} # manual trigger

concurrency:
  group: zensil-etl
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Run all pipelines
        working-directory: .
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SPAPI_CLIENT_ID: ${{ secrets.SPAPI_CLIENT_ID }}
          SPAPI_CLIENT_SECRET: ${{ secrets.SPAPI_CLIENT_SECRET }}
          SPAPI_REFRESH_TOKEN: ${{ secrets.SPAPI_REFRESH_TOKEN }}
          ADS_CLIENT_ID: ${{ secrets.ADS_CLIENT_ID }}
          ADS_CLIENT_SECRET: ${{ secrets.ADS_CLIENT_SECRET }}
          ADS_REFRESH_TOKEN: ${{ secrets.ADS_REFRESH_TOKEN }}
          ADS_PROFILE_ID: ${{ secrets.ADS_PROFILE_ID }}
          FLIPKART_APP_ID: ${{ secrets.FLIPKART_APP_ID }}
          FLIPKART_APP_SECRET: ${{ secrets.FLIPKART_APP_SECRET }}
          SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: python -m etl.run_all
